<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live2D Pet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }
        #canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- 加载顺序严格: live2d core → pixi → pixi-live2d-display cubism2 bundle -->
    <!-- cubism2.min.js 依赖全局 PIXI 对象,所以 pixi 必须先加载 -->
    <script src="live2d.min.js"></script>
    <script src="pixi.min.js"></script>
    <script src="cubism2.min.js"></script>
    <script>
        (async function () {
            // 关闭 PIXI 全局 mipmap,绕过部分移动 GPU(如 Honor Mali)的
            // glGenerateMipmap GL_INVALID_OPERATION 错误。
            // Live2D Cubism 2.1 纹理是预渲染 sprite sheet,不需要 mipmap 多级采样。
            PIXI.settings.MIPMAP_TEXTURES = PIXI.MIPMAP_MODES.OFF;

            const app = new PIXI.Application({
                view: document.getElementById('canvas'),
                autoStart: true,
                backgroundAlpha: 0,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true,
                width: window.innerWidth,
                height: window.innerHeight
            });

            // Live2D 模型桥接接口,供原生侧通过 evaluateJavascript 调用
            window.live2dBridge = {
                model: null,
                tap: function (x, y) {
                    if (this.model) {
                        this.model.tap(x, y);
                    }
                },
                focus: function (x, y) {
                    if (this.model) {
                        this.model.focusX = x / window.innerWidth;
                        this.model.focusY = y / window.innerHeight;
                    }
                },
                expression: function (name) {
                    if (this.model) {
                        this.model.expression(name);
                    }
                },
                motion: function (group, index) {
                    if (this.model) {
                        this.model.motion(group, index);
                    }
                }
            };

            try {
                const model = await PIXI.live2d.Live2DModel.from('shizuku/shizuku.model.json', {
                    autoInteract: false,
                    autoUpdate: true
                });

                // 调试日志:确认 canvas 和 model 实际尺寸
                const canvasW = app.view.width;
                const canvasH = app.view.height;
                console.log(`[DEBUG] window=${window.innerWidth}x${window.innerHeight} dpr=${window.devicePixelRatio}`);
                console.log(`[DEBUG] canvas=${canvasW}x${canvasH}`);
                console.log(`[DEBUG] model original=${model.width}x${model.height} anchors=${model.anchor.x},${model.anchor.y}`);

                app.stage.addChild(model);

                // Live2D 桌宠被 Compose 限制在 120dp 的 Box 里,canvas 实际尺寸很小。
                // 直接 fit 到 canvas 会让模型占满整个 WebView(可能正好等于 120dp)。
                // 用 model.originalWidth/originalHeight 计算一个让模型占 canvas 较大比例
                // 但留出边距的缩放,确保可见。
                const origW = model.internalModel?.originalWidth || model.width;
                const origH = model.internalModel?.originalHeight || model.height;
                // 让模型占据 canvas 较大边的 90%
                const fitScale = Math.min(canvasW / origW, canvasH / origH) * 0.9;
                model.scale.set(fitScale);
                console.log(`[DEBUG] fitScale=${fitScale} scaled=${model.width}x${model.height}`);

                // 锚点设为 (0.5, 0.5) 后, x/y 即模型中心点位置
                model.anchor.set(0.5, 0.5);
                model.x = canvasW / 2;
                model.y = canvasH / 2;
                console.log(`[DEBUG] final pos=(${model.x},${model.y}) size=${model.width}x${model.height}`);

                window.live2dBridge.model = model;

                // 通知原生侧模型加载完成
                if (window.AndroidBridge && window.AndroidBridge.onModelLoaded) {
                    window.AndroidBridge.onModelLoaded();
                }
            } catch (err) {
                console.error('Live2D model load failed:', err);
                if (window.AndroidBridge && window.AndroidBridge.onError) {
                    window.AndroidBridge.onError(String(err && err.message || err));
                }
            }
        })();
    </script>
</body>
</html>
