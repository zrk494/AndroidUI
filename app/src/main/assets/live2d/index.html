<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live2D Pet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }
        #canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- 加载顺序严格: live2d core → pixi → pixi-live2d-display cubism2 bundle -->
    <!-- cubism2.min.js 依赖全局 PIXI 对象,所以 pixi 必须先加载 -->
    <script src="live2d.min.js"></script>
    <script src="pixi.min.js"></script>
    <script src="cubism2.min.js"></script>
    <script>
        (async function () {
            // 关闭 PIXI 全局 mipmap,绕过部分移动 GPU(如 Honor Mali)的
            // glGenerateMipmap GL_INVALID_OPERATION 错误。
            // Live2D Cubism 2.1 纹理是预渲染 sprite sheet,不需要 mipmap 多级采样。
            PIXI.settings.MIPMAP_TEXTURES = PIXI.MIPMAP_MODES.OFF;

            const app = new PIXI.Application({
                view: document.getElementById('canvas'),
                autoStart: true,
                backgroundAlpha: 0,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true,
                width: window.innerWidth,
                height: window.innerHeight
            });

            // Live2D 模型桥接接口,供原生侧通过 evaluateJavascript 调用
            window.live2dBridge = {
                model: null,
                tap: function (x, y) {
                    if (this.model) {
                        this.model.tap(x, y);
                    }
                },
                focus: function (x, y) {
                    if (this.model) {
                        this.model.focusX = x / window.innerWidth;
                        this.model.focusY = y / window.innerHeight;
                    }
                },
                expression: function (name) {
                    if (this.model) {
                        this.model.expression(name);
                    }
                },
                motion: function (group, index) {
                    if (this.model) {
                        this.model.motion(group, index);
                    }
                }
            };

            try {
                const model = await PIXI.live2d.Live2DModel.from('shizuku/shizuku.model.json', {
                    autoInteract: false,
                    autoUpdate: true
                });

                // 重要:用 app.screen 而不是 app.view。
                // app.view.width 是 canvas backing buffer 尺寸(= CSS尺寸 × dpr),
                // app.screen.width 才是 PIXI Renderer 实际渲染的逻辑尺寸。
                // 用错会让模型定位到渲染区域之外,导致不可见。
                const screenW = app.screen.width;
                const screenH = app.screen.height;
                console.log(`[DEBUG] screen=${screenW}x${screenH} view=${app.view.width}x${app.view.height} model=${model.width}x${model.height}`);

                // 先缩放和定位,再加到 stage
                const origW = model.internalModel?.originalWidth || model.width;
                const origH = model.internalModel?.originalHeight || model.height;
                const fitScale = Math.min(screenW / origW, screenH / origH) * 0.9;
                model.scale.set(fitScale);
                model.anchor.set(0.5, 0.5);
                model.x = screenW / 2;
                model.y = screenH / 2;
                console.log(`[DEBUG] fitScale=${fitScale} pos=(${model.x},${model.y}) size=${model.width}x${model.height}`);

                app.stage.addChild(model);

                // 修复 "no texture bound to unit 1" 警告导致模型透明的问题。
                // Cubism 2 渲染器在 mask 纹理(unit 1)绑定前就渲染了第一帧,导致模型全透明。
                // 强制更新一次模型内部状态,让 mask 纹理先绑定好,再触发 stage 重绘。
                if (model.update) {
                    model.update(0.016);
                }
                // 触发一次 resize 事件强制 PIXI 重新渲染整个 stage
                window.dispatchEvent(new Event('resize'));

                window.live2dBridge.model = model;

                if (window.AndroidBridge && window.AndroidBridge.onModelLoaded) {
                    window.AndroidBridge.onModelLoaded();
                }
            } catch (err) {
                console.error('Live2D model load failed:', err);
                if (window.AndroidBridge && window.AndroidBridge.onError) {
                    window.AndroidBridge.onError(String(err && err.message || err));
                }
            }
        })();
    </script>
</body>
</html>
